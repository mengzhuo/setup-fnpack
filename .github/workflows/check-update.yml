name: Check fnpack update

on:
  schedule:
    - cron: '0 8 * * 1'  # Monday 8am UTC
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      - name: Check version
        id: check
        run: npx tsx scripts/check-version.ts

      - name: Create PR
        if: steps.check.outputs.updated == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: bump fnpack to ${{ steps.check.outputs.new_version }}"
          title: "chore: bump fnpack to ${{ steps.check.outputs.new_version }}"
          body: "Automated update to fnpack ${{ steps.check.outputs.new_version }}"
          branch: "fnpack-${{ steps.check.outputs.new_version }}"
