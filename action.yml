name: 'Setup fnpack'
description: 'Download and install fnpack CLI for building fnOS .fpk packages'
inputs:
  version:
    description: 'fnpack version to install'
    required: false
    default: '1.2.3'
  dir:
    description: 'Working directory for fnpack commands'
    required: false
    default: '.'
outputs:
  fnpack-path:
    description: 'Path to the fnpack binary'
runs:
  using: 'node24'
  main: 'dist/index.js'
branding:
  icon: 'package'
  color: 'blue'
